apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator-sa
  namespace: homework
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator-role
  namespace: homework
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator-rb
  namespace: homework
subjects:
  - kind: ServiceAccount
    name: mysql-operator-sa
    namespace: homework
roleRef:
  kind: ClusterRole
  name: mysql-operator-role
  apiGroup: rbac.authorization.k8s.io