releases:
  # --- Scenario 1: PROD ---
  - name: kafka-prod
    namespace: prod
    chart: ./my-kafka
    createNamespace: true
    values:
      - replicaCount: 5
        image: apache/kafka:3.7.0
        auth:
          # Временно ставим PLAINTEXT, чтобы поды поднялись без ошибок в скриптах
          protocol: PLAINTEXT

  # --- Scenario 2: DEV ---
  - name: kafka-dev
    namespace: dev
    chart: ./my-kafka
    createNamespace: true
    values:
      - replicaCount: 1
        image: apache/kafka:3.7.0
        auth:
          protocol: PLAINTEXT