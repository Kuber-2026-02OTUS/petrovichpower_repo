
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "homework-chart.fullname" . }}-monitoring
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "homework-chart.fullname" . }}-metrics-reader
rules:
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "homework-chart.fullname" . }}-monitoring-binding
subjects:
- kind: ServiceAccount
  name: {{ include "homework-chart.fullname" . }}-monitoring
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "homework-chart.fullname" . }}-metrics-reader
  apiGroup: rbac.authorization.k8s.io